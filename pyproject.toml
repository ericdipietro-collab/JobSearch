[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "jobsearch"
version = "0.1.0"
description = "Automated job search pipeline and application tracker"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
dependencies = [
    "requests>=2.31.0",
    "PyYAML>=6.0.1",
    "beautifulsoup4>=4.12.0",
    "pandas>=2.1.0",
    "openpyxl>=3.1.0",
    "streamlit>=1.30.0",
    "pydantic-settings>=2.1.0",
    "click>=8.1.0",
]

[project.scripts]
jobsearch = "jobsearch.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/jobsearch"]
