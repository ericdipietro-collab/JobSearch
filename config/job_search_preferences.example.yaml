# ──────────────────────────────────────────────────────────────────────────────
# Job Search Preferences — example / template
#
# Copy this file to config/job_search_preferences.yaml and fill in your own
# values.  The real preferences file is gitignored to keep personal salary and
# location data off of GitHub.
# ──────────────────────────────────────────────────────────────────────────────

version: 1
search:
  # remote_only | remote_or_hybrid | any
  location_policy: remote_only
  geography:
    us_only: true
  location_preferences:
    remote_us:
      enabled: true
      bonus: 14          # score boost for confirmed-remote roles
    local_hybrid:
      enabled: true
      # ── PERSONAL: set to your own zip code ──────────────────────────────────
      primary_zip: 'YOUR_ZIP'
      radius_miles: 30
      # City/town names that indicate a role is within commuting distance.
      # Add any city names that appear in job listings near you.
      markers:
      - YOUR_CITY
      - NEARBY_CITY_1
      - NEARBY_CITY_2
      # ────────────────────────────────────────────────────────────────────────
      bonus: 4
      allow_if_salary_at_least_usd: 120000   # hybrid only if salary meets this floor
  compensation:
    enforce_min_salary: true
    # ── PERSONAL: set your salary floor ─────────────────────────────────────
    target_salary_usd: 150000
    min_salary_usd: 150000
    preferred_remote_min_salary_usd: 150000
    # ────────────────────────────────────────────────────────────────────────
    allow_missing_salary: true    # include jobs that don't list salary
    salary_floor_basis: midpoint  # midpoint | low_end | high_end
    negotiation_buffer_pct: 0.05  # 5% negotiation buffer applied to floor
  recency:
    enforce_job_age: true
    max_job_age_days: 21

scoring:
  minimum_score_to_keep: 35
  apply_now:
    require_strong_title: true
    min_role_alignment: 6.0
    direct_title_markers:
    - architect
    - product manager
    - program manager
    - business analyst
    - systems analyst
    - solution architect
    - product architect
    - integration architect
    - platform
    - api
    - data architect
  adjustments:
    missing_salary_penalty: 6
    salary_at_or_above_target_bonus: 6
    salary_meets_floor_bonus: 2
    salary_below_target_penalty: 12
  keyword_matching:
    count_unique_matches_only: true
    positive_keyword_cap: 40
    negative_keyword_cap: 45
  action_buckets:
    ranks:
      APPLY NOW: 0
      REVIEW TODAY: 1
      WATCH: 2
      MANUAL REVIEW: 3
      IGNORE: 4
    rules:
    - label: MANUAL REVIEW
      when:
        manual_review: true
    - label: APPLY NOW
      when:
        min_score: 88
        eligible: true
        strong_title: true
        known_salary_for_apply: true
    - label: REVIEW TODAY
      when:
        min_score: 88
        eligible: true
        strong_title: true
        known_salary_for_apply: false
    - label: REVIEW TODAY
      when:
        min_score: 74
        eligible: true
    - label: REVIEW TODAY
      when:
        tier_in:
        - 1
        min_score: 67
        eligible: true
    - label: WATCH
      when:
        min_score: 55
        eligible: true
    - label: WATCH
      when:
        min_score: 40
    - label: IGNORE
      when: {}

# ── Title keyword configuration ───────────────────────────────────────────────
# Customise these for your target role family.
titles:
  require_one_positive_keyword: true
  # Title must contain at least one of these to pass the title gate.
  positive_keywords:
  - product manager
  - product management
  - program manager
  - architect
  - integration
  - solution
  - platform
  - business systems analyst
  - business analyst
  - technical product
  - technical program
  - product lead
  - product owner
  negative_disqualifiers:
  - software engineer
  - engineering manager
  - data engineer
  - machine learning engineer
  - sales engineer
  - devops engineer
  - site reliability
  - security engineer
  - network engineer
  - infrastructure engineer
  - recruiter
  - talent
  - human resources
  - attorney
  - counsel
  - legal
  - account executive
  - account manager
  - customer success
  - customer support
  - marketing manager
  - designer
  - ux researcher
  - data scientist
  - research scientist
  - financial analyst
  - controller
  - accountant
  - sales
  # Title weights — higher weight = stronger signal.
  # Weight >= fast_track_min_weight triggers base score of fast_track_base_score.
  positive_weights:
    technical product manager: 8
    solution architect: 7
    product architect: 7
    integration architect: 7
    platform architect: 6
    business systems analyst: 5
    systems analyst: 4
    senior product manager: 4
    principal product manager: 5
    staff product manager: 5
    program manager: 3
  fast_track_base_score: 50
  fast_track_min_weight: 8

# ── Job description keyword scoring ──────────────────────────────────────────
# Edit these to match your domain expertise and target market.
keywords:
  body_positive:
    # Domain-specific signals — replace with keywords relevant to your field.
    # Higher scores = stronger domain fit signal.
    capital markets: 8
    fixed income: 6
    portfolio analytics: 7
    financial reporting: 7
    reconciliation: 7
    fund accounting: 7
    wealth management: 7
    investment management: 7
    api integration: 7
    data integration: 6
    financial services: 5
    fintech: 4
    etl: 4
    data pipeline: 4
  body_negative:
    # Roles / technologies that are a poor fit — scoring penalty per match.
    # High values (20+) will push a job below the keep threshold.
    incident management: 25
    site reliability: 30
    kubernetes: 20
    ci/cd: 15
    vector database: 30
    llm infrastructure: 30
    ml platform: 25
    model training: 20
    deep learning: 25
    blockchain: 20
    defi: 25
    web3: 25
    write production code: 25
    daily coding: 25
    hands-on coding: 25
    marketing automation: 25
    seo/sem: 25

policy:
  title_rescue:
    adjacent_title_bonus: 8
    adjacent_title_strong_domain_bonus: 6
    adjacent_title_min_score_to_keep: 26
    strong_body_domain_markers:
    - risk
    - fraud
    - banking
    - platform
    - api
    - integrations
    - compliance
    - payments
    - ledger
    adjacent_title_markers:
    - strategic insights
    - risk
    - implementation
    - technical programs
    analyst_variant_markers:
    - strategic insights
    - credit risk
    - risk analyst
    - implementation analyst
    - implementation specialist
    - technical analyst
    - product analyst
    - compliance analyst
    adjacent_title_auto_rescue_patterns:
    - compliance analyst
    - risk analyst
    - implementation analyst
    - implementation specialist
    - technical program
